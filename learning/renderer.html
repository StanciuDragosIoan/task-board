<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Docs — MangaReader</title>
    <link rel="icon" type="image/svg+xml" href="./assets/img/favicon.svg" />

    <!-- marked.js — markdown parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- highlight.js — syntax highlighting -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/highlight.min.js"></script>

    <style>
        /* ── Reset & base ─────────────────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #090e1a;
            --surface: #0f1729;
            --border: #1e2d4a;
            --neon: #00c8ff;
            --neon-dim: rgba(0, 200, 255, 0.15);
            --text: #c8d8f0;
            --text-dim: #6a7fa0;
            --heading: #e8f0ff;
            --code-bg: #0a0f1e;
            --bar-h: 56px;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 16px;
            line-height: 1.7;
            min-height: 100vh;
        }

        /* ── Top bar ──────────────────────────────────────────────── */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--bar-h);
            background: rgba(9, 14, 26, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 24px;
            z-index: 100;
        }

        .topbar-logo {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--neon);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            white-space: nowrap;
            text-decoration: none;
        }

        .topbar-logo span {
            color: var(--text-dim);
            font-weight: 400;
        }

        .divider {
            width: 1px;
            height: 20px;
            background: var(--border);
            flex-shrink: 0;
        }

        /* ── File picker ──────────────────────────────────────────── */
        .file-picker {
            position: relative;
            flex-shrink: 0;
        }

        .file-picker select {
            appearance: none;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.875rem;
            padding: 6px 36px 6px 12px;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
            max-width: 260px;
        }

        .file-picker select:hover,
        .file-picker select:focus {
            border-color: var(--neon);
        }

        .file-picker::after {
            content: '▾';
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--neon);
            pointer-events: none;
            font-size: 0.75rem;
        }

        /* ── Current file label ───────────────────────────────────── */
        .file-label {
            font-size: 0.8rem;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
        }

        .file-label strong {
            color: var(--text);
        }

        /* ── Progress bar ─────────────────────────────────────────── */
        .progress-bar {
            position: fixed;
            top: var(--bar-h);
            left: 0;
            height: 2px;
            width: 0%;
            background: var(--neon);
            box-shadow: 0 0 8px var(--neon);
            z-index: 101;
            transition: width 0.1s linear;
        }

        /* ── Layout ───────────────────────────────────────────────── */
        .layout {
            display: flex;
            padding-top: var(--bar-h);
            min-height: 100vh;
        }

        /* ── TOC sidebar ──────────────────────────────────────────── */
        .toc {
            position: sticky;
            top: var(--bar-h);
            align-self: flex-start;
            width: 240px;
            flex-shrink: 0;
            height: calc(100vh - var(--bar-h));
            overflow-y: auto;
            padding: 28px 0 28px 20px;
            border-right: 1px solid var(--border);
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .toc-title {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 12px;
        }

        .toc a {
            display: block;
            font-size: 0.82rem;
            color: var(--text-dim);
            text-decoration: none;
            padding: 4px 8px;
            border-radius: 4px;
            border-left: 2px solid transparent;
            transition: color 0.15s, border-color 0.15s, background 0.15s;
            word-break: break-word;
        }

        .toc a:hover {
            color: var(--text);
            background: var(--neon-dim);
        }

        .toc a.active {
            color: var(--neon);
            border-left-color: var(--neon);
            background: var(--neon-dim);
        }

        .toc a.h3 {
            padding-left: 20px;
            font-size: 0.78rem;
        }

        .toc a.h4 {
            padding-left: 32px;
            font-size: 0.75rem;
        }

        /* ── Main content ─────────────────────────────────────────── */
        .content {
            flex: 1;
            min-width: 0;
            padding: 48px 56px 80px;
            max-width: 860px;
        }

        /* ── Markdown styles ──────────────────────────────────────── */
        .md h1,
        .md h2,
        .md h3,
        .md h4 {
            color: var(--heading);
            font-weight: 700;
            line-height: 1.3;
            scroll-margin-top: calc(var(--bar-h) + 16px);
        }

        .md h1 {
            font-size: 2rem;
            margin: 0 0 24px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .md h2 {
            font-size: 1.35rem;
            margin: 48px 0 16px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        .md h3 {
            font-size: 1.1rem;
            margin: 32px 0 12px;
            color: var(--neon);
        }

        .md h4 {
            font-size: 0.95rem;
            margin: 24px 0 8px;
            color: var(--text);
        }

        .md p {
            margin: 0 0 16px;
        }

        .md a {
            color: var(--neon);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.15s;
        }

        .md a:hover {
            border-bottom-color: var(--neon);
        }

        .md ul,
        .md ol {
            margin: 0 0 16px 24px;
        }

        .md li {
            margin-bottom: 4px;
        }

        .md li>ul,
        .md li>ol {
            margin-top: 4px;
            margin-bottom: 0;
        }

        .md blockquote {
            border-left: 3px solid var(--neon);
            margin: 20px 0;
            padding: 12px 20px;
            background: var(--neon-dim);
            border-radius: 0 8px 8px 0;
            color: var(--text);
        }

        .md blockquote p {
            margin: 0;
        }

        .md hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 40px 0;
        }

        /* inline code */
        .md code {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", Menlo, monospace;
            font-size: 0.82em;
            padding: 2px 6px;
            color: #e8c97a;
        }

        /* code blocks */
        .md pre {
            background: var(--code-bg) !important;
            border: 1px solid var(--border);
            border-radius: 10px;
            margin: 20px 0;
            overflow-x: auto;
            position: relative;
        }

        .md pre code {
            background: none !important;
            border: none !important;
            padding: 20px 24px !important;
            font-size: 0.83rem !important;
            line-height: 1.6;
            color: inherit !important;
            display: block;
        }

        /* copy button wrapper — sits outside the pre's overflow context */
        .pre-wrapper {
            position: relative;
            margin: 20px 0;
        }

        .pre-wrapper .md pre,
        .md .pre-wrapper pre {
            margin: 0;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-dim);
            font-size: 0.72rem;
            font-family: inherit;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.15s, color 0.15s, border-color 0.15s;
            z-index: 2;
        }

        .pre-wrapper:hover .copy-btn {
            opacity: 1;
        }

        .copy-btn:hover {
            color: var(--neon);
            border-color: var(--neon);
        }

        .copy-btn.copied {
            color: #4ade80;
            border-color: #4ade80;
        }

        /* tables */
        .md table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 0.875rem;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .md th {
            background: var(--surface);
            color: var(--neon);
            font-weight: 600;
            text-align: left;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
        }

        .md td {
            padding: 9px 16px;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }

        .md tr:last-child td {
            border-bottom: none;
        }

        .md tr:nth-child(even) td {
            background: rgba(255, 255, 255, 0.02);
        }

        /* ── Loading / error states ───────────────────────────────── */
        .state-msg {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-top: 40px;
        }

        .state-msg.error {
            color: #ff6b6b;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-top-color: var(--neon);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Responsive ───────────────────────────────────────────── */
        @media (max-width: 900px) {
            .toc {
                display: none;
            }

            .content {
                padding: 32px 24px 60px;
            }
        }

        @media (max-width: 480px) {
            .content {
                padding: 24px 16px 60px;
            }

            .file-label {
                display: none;
            }

            .md h1 {
                font-size: 1.5rem;
            }

            .md h2 {
                font-size: 1.15rem;
            }
        }

        /* ── Scrollbar ────────────────────────────────────────────── */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-dim);
        }
    </style>
</head>

<body>

    <div class="progress-bar" id="progress"></div>

    <!-- Top bar -->
    <header class="topbar">
        <a class="topbar-logo" href="./index.html">Manga<span>Reader</span></a>
        <div class="divider"></div>
        <div class="file-picker">
            <select id="filePicker">
                <option value="README.md">README.md</option>
                <option value="howToRebuild.md">howToRebuild.md</option>
                <option value="howToBuildPrototype.md">howToBuildPrototype.md</option>
                <option value="howToBuildBasicPrototype.md">howToBuildBasicPrototype.md</option>
            </select>
        </div>
        <div class="file-label">Reading: <strong id="fileLabel">how-to-scrape.md</strong></div>
    </header>

    <div class="layout">

        <!-- TOC sidebar (desktop) -->
        <nav class="toc" id="toc">
            <div class="toc-title">Contents</div>
        </nav>

        <!-- Rendered markdown -->
        <main class="content">
            <div class="md" id="output">
                <div class="state-msg">
                    <div class="spinner"></div> Loading…
                </div>
            </div>
        </main>

    </div>

    <script>
        const picker = document.getElementById('filePicker');
        const output = document.getElementById('output');
        const toc = document.getElementById('toc');
        const fileLabel = document.getElementById('fileLabel');
        const progress = document.getElementById('progress');

        // ── marked config ────────────────────────────────────────────
        marked.setOptions({
            breaks: false,
            gfm: true,
        });

        // Custom renderer — adds IDs to headings for TOC anchors
        const renderer = new marked.Renderer();
        renderer.heading = function ({ text, depth }) {
            const id = text.toLowerCase().replace(/[^\w\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-').trim();
            return `<h${depth} id="${id}">${text}</h${depth}>\n`;
        };

        // ── Load and render a file ────────────────────────────────────
        async function loadFile(filename) {
            output.innerHTML = '<div class="state-msg"><div class="spinner"></div> Loading…</div>';
            toc.innerHTML = '<div class="toc-title">Contents</div>';
            fileLabel.textContent = filename;
            document.title = filename + ' — MangaReader Docs';

            let md;
            try {
                const res = await fetch('./' + filename);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                md = await res.text();
            } catch (err) {
                output.innerHTML = `<div class="state-msg error">⚠ Could not load "${filename}" — ${err.message}<br><small style="margin-top:8px;display:block;color:var(--text-dim)">Make sure you're running this via a local server, not file://</small></div>`;
                return;
            }

            // Render markdown
            output.innerHTML = marked.parse(md, { renderer });

            // Syntax highlight all code blocks (guard in case CDN fails to load)
            if (typeof hljs !== 'undefined') {
                output.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
            }

            // Inject copy buttons — wrap each pre in a relative div so the
            // button isn't clipped by the pre's overflow-x:auto
            output.querySelectorAll('pre').forEach(pre => {
                const wrapper = document.createElement('div');
                wrapper.className = 'pre-wrapper';
                pre.parentNode.insertBefore(wrapper, pre);
                wrapper.appendChild(pre);

                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                const copyIcon = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
                btn.innerHTML = copyIcon + 'Copy';
                btn.addEventListener('click', () => {
                    const code = pre.querySelector('code');
                    navigator.clipboard.writeText(code?.innerText ?? '').then(() => {
                        btn.textContent = 'Copied!';
                        btn.classList.add('copied');
                        setTimeout(() => {
                            btn.innerHTML = copyIcon + 'Copy';
                            btn.classList.remove('copied');
                        }, 2000);
                    });
                });
                wrapper.appendChild(btn);
            });

            // Build TOC from headings
            buildToc();

            // Scroll to top
            window.scrollTo({ top: 0 });
        }

        // ── Build TOC ────────────────────────────────────────────────
        function buildToc() {
            const headings = output.querySelectorAll('h1, h2, h3');
            const tocTitle = '<div class="toc-title">Contents</div>';

            if (headings.length === 0) {
                toc.innerHTML = tocTitle;
                return;
            }

            const links = Array.from(headings).map(h => {
                const level = h.tagName.toLowerCase();
                const cls = level === 'h3' ? ' h3' : level === 'h4' ? ' h4' : '';
                return `<a href="#${h.id}" class="${cls}" data-id="${h.id}">${h.textContent}</a>`;
            }).join('');

            toc.innerHTML = tocTitle + links;
        }

        // ── TOC active link on scroll ────────────────────────────────
        const headingObserver = new IntersectionObserver((entries) => {
            for (const entry of entries) {
                if (entry.isIntersecting) {
                    toc.querySelectorAll('a').forEach(a => a.classList.remove('active'));
                    const active = toc.querySelector(`a[data-id="${entry.target.id}"]`);
                    if (active) {
                        active.classList.add('active');
                        // Scroll the TOC to keep active item in view
                        active.scrollIntoView({ block: 'nearest' });
                    }
                }
            }
        }, { rootMargin: '0px 0px -70% 0px', threshold: 0 });

        // Re-observe headings whenever content changes
        function observeHeadings() {
            headingObserver.disconnect();
            output.querySelectorAll('h1, h2, h3').forEach(h => headingObserver.observe(h));
        }

        // Patch loadFile to also observe headings after render
        const _origLoad = loadFile;
        async function loadFileAndObserve(filename) {
            await _origLoad(filename);
            observeHeadings();
        }

        // ── Reading progress bar ─────────────────────────────────────
        window.addEventListener('scroll', () => {
            const total = document.documentElement.scrollHeight - window.innerHeight;
            const pct = total > 0 ? (window.scrollY / total) * 100 : 0;
            progress.style.width = pct + '%';
        }, { passive: true });

        // ── File picker ──────────────────────────────────────────────
        picker.addEventListener('change', () => {
            loadFileAndObserve(picker.value);
        });

        // ── Init ─────────────────────────────────────────────────────
        loadFileAndObserve('howToBuildBasicPrototype.md');
    </script>

</body>

</html>
